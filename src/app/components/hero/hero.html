<section class="hero" id="hero">
  <div class="scanline"></div>

  <div class="hero-content">
    <div class="hero-logo animate-fade-in">
      <img src="logo.png" alt="Policía Santabria" class="hero-logo-img" />
    </div>

    <h1 class="hero-title animate-fade-up">
      DEPARTAMENTO<br>
      <span class="hero-title-accent">DE POLICÍA</span>
    </h1>

    <p class="hero-subtitle animate-fade-up">
      Protegiendo la ciudad en el servidor de Santabria FiveM.<br>
      Honor, Disciplina y Servicio a la comunidad.
    </p>

    <div class="hero-stats animate-fade-up">
      <div class="stat-item">
        <span class="stat-number">3+</span>
        <span class="stat-label">Unidades Activas</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-number">6</span>
        <span class="stat-label">Rangos Oficiales</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-number">24/7</span>
        <span class="stat-label">Patrullaje</span>
      </div>
    </div>

    <div class="hero-buttons animate-fade-up">
      <a class="btn btn-gold" (click)="scrollTo('apply')">
        <i class="fas fa-file-signature"></i> Aplicar Ahora
      </a>
      <a class="btn btn-outline" (click)="scrollTo('ranks')">
        <i class="fas fa-medal"></i> Ver Rangos
      </a>
    </div>
  </div>

  <div class="hero-scroll-indicator">
    <span>DESPLAZA</span>
    <div class="scroll-arrow">
      <i class="fas fa-chevron-down"></i>
    </div>
  </div>
</section>
